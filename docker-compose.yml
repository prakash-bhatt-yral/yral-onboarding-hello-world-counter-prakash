services:
  app:
    image: ${IMAGE_REF:-yral-onboarding-hello-world-counter-prakash:local}
    build:
      context: .
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-3000}
      GREETING_MODE: ${GREETING_MODE:-plain}
      RUST_LOG: ${RUST_LOG:-info}
    expose:
      - "3000"

  caddy:
    image: caddy:2.10.2-alpine
    depends_on:
      - app
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro

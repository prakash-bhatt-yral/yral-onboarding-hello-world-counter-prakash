services:
  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.17
    environment:
      ETCD_NAME: "${NODE_NAME}"
      ETCD_DATA_DIR: "/etcd-data"
      ETCD_INITIAL_ADVERTISE_PEER_URLS: "http://${NODE_IP}:2380"
      ETCD_LISTEN_PEER_URLS: "http://0.0.0.0:2380"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
      ETCD_ADVERTISE_CLIENT_URLS: "http://${NODE_IP}:2379"
      ETCD_INITIAL_CLUSTER: "${ETCD_INITIAL_CLUSTER}"
      ETCD_INITIAL_CLUSTER_TOKEN: "yral-cluster"
      # Detected by deploy-ha-compose.sh before compose up: "new" on first boot,
      # "existing" on every subsequent restart. The etcd image is distroless so
      # shell-based entrypoint detection is not possible inside the container.
      ETCD_INITIAL_CLUSTER_STATE: "${ETCD_INITIAL_CLUSTER_STATE:-new}"
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd_data:/etcd-data
    restart: always

  patroni:
    build:
      context: ./postgres
      dockerfile: Dockerfile.patroni
    environment:
      NODE_NAME: "${NODE_NAME}"
      # All 3 etcd endpoints so Patroni can reach DCS even if the local etcd container is down
      ETCD_HOSTS: "${SERVER_1_IP}:2379,${SERVER_2_IP}:2379,${SERVER_3_IP}:2379"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-counter}"
      APP_HOST: "${NODE_IP}"
    volumes:
      - patroni_data:/var/lib/postgresql/data
    ports:
      # Expose PG and Patroni API so HAProxy config on other nodes can access Patroni API dynamically
      - "8008:8008"
      - "5432:5432"
    depends_on:
      - etcd
    restart: always

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: postgres-router
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-counter}
      POOL_MODE: transaction
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
      LISTEN_PORT: 6432
    depends_on:
      - postgres-router
    restart: always

  postgres-router:
    image: haproxy:3.1-alpine
    volumes:
      - ./runtime/haproxy-ha.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    expose:
      - "5432"
    restart: always

  app:
    image: ${IMAGE_REF:-yral-onboarding-hello-world-counter-prakash:local}
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "3000"
      SERVER_LABEL: "${NODE_NAME}"
      GREETING_MODE: "${GREETING_MODE:-plain}"
      COUNTER_STORE: "${COUNTER_STORE:-postgres}"
      DATABASE_URL: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-counter}@pgbouncer:6432/postgres"
      RUST_LOG: "${RUST_LOG:-info}"
    depends_on:
      - pgbouncer
    # Publish on host port 3001 so the shared infra Caddy can reach this app
    # via localhost:3001. Each project on these servers uses a unique 300x port.
    ports:
      - "3001:3000"
    restart: always

volumes:
  etcd_data:
  patroni_data:

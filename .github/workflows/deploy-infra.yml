name: Deploy Infra

on:
  push:
    branches: [main]
    paths:
      - infra/**
      - scripts/deploy/deploy-infra.sh
      - scripts/deploy/render-infra-caddyfile.sh
  workflow_dispatch:

# Never cancel an in-progress infra deploy — a partial Caddy reload drops all traffic
concurrency:
  group: deploy-infra
  cancel-in-progress: false

env:
  APP_DIR: /home/deploy/yral-onboarding-hello-world-counter-prakash
  SERVER_1_IP: 94.130.13.115
  SERVER_2_IP: 88.99.151.102
  SERVER_3_IP: 138.201.129.173

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CADDY_TLS_CERT_PEM_B64: ${{ secrets.CADDY_TLS_CERT_PEM_B64 }}
      CADDY_TLS_KEY_PEM_B64: ${{ secrets.CADDY_TLS_KEY_PEM_B64 }}
      NOFEEBOOKING_TLS_CERT_PEM_B64: ${{ secrets.NOFEEBOOKING_TLS_CERT_PEM_B64 }}
      NOFEEBOOKING_TLS_KEY_PEM_B64: ${{ secrets.NOFEEBOOKING_TLS_KEY_PEM_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy infra to all servers
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          for NODE_IP in "${SERVER_1_IP}" "${SERVER_2_IP}" "${SERVER_3_IP}"; do
            echo "--> Deploying infra to ${NODE_IP}"
            ssh-keyscan -H "${NODE_IP}" >> ~/.ssh/known_hosts 2>/dev/null || true

            ssh "deploy@${NODE_IP}" \
              "mkdir -p ${APP_DIR}/infra ${APP_DIR}/scripts/deploy"

            scp infra/Caddyfile.template infra/docker-compose.infra.yml \
              "deploy@${NODE_IP}:${APP_DIR}/infra/"

            scp scripts/deploy/deploy-infra.sh scripts/deploy/render-infra-caddyfile.sh \
              "deploy@${NODE_IP}:${APP_DIR}/scripts/deploy/"

            # Sentry and storj-interface only on server_1; nofeebooking.com on all servers
            if [[ "${NODE_IP}" == "${SERVER_1_IP}" ]]; then
              SENTRY_ENABLED=true
              STORJ_ENABLED=true
            else
              SENTRY_ENABLED=false
              STORJ_ENABLED=false
            fi
            NOFEEBOOKING_ENABLED=true

            ssh "deploy@${NODE_IP}" \
              "export APP_DIR='${APP_DIR}'; \
               export INFRA_DIR='${APP_DIR}/infra'; \
               export CADDY_TLS_CERT_PEM_B64='${CADDY_TLS_CERT_PEM_B64}'; \
               export CADDY_TLS_KEY_PEM_B64='${CADDY_TLS_KEY_PEM_B64}'; \
               export NOFEEBOOKING_TLS_CERT_PEM_B64='${NOFEEBOOKING_TLS_CERT_PEM_B64}'; \
               export NOFEEBOOKING_TLS_KEY_PEM_B64='${NOFEEBOOKING_TLS_KEY_PEM_B64}'; \
               export SENTRY_ENABLED='${SENTRY_ENABLED}'; \
               export NOFEEBOOKING_ENABLED='${NOFEEBOOKING_ENABLED}'; \
               export NOFEEBOOKING_SERVER_IP='${SERVER_1_IP}'; \
               export NOFEEBOOKING_BACKEND_2='${SERVER_2_IP}'; \
               export NOFEEBOOKING_BACKEND_3='${SERVER_3_IP}'; \
               export STORJ_ENABLED='${STORJ_ENABLED}'; \
               export STORJ_SERVER_IP='${SERVER_1_IP}'; \
               cd '${APP_DIR}' && bash scripts/deploy/deploy-infra.sh"
          done

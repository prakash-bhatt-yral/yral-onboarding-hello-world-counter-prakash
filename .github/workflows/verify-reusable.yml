name: Verify Reusable

on:
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

      - name: Verify postgres feature path
        run: cargo check -p bin-server --no-default-features --features postgres-store

      - name: Verify deploy helper scripts
        run: |
          bash scripts/test/test-render-caddyfile.sh
          bash scripts/test/test-render-infra-caddyfile.sh
          bash scripts/test/test-render-postgres-runtime.sh
          bash scripts/test/test-export-caddy-managed-cert.sh

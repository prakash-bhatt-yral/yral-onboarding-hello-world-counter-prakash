name: Rebuild Standby

on:
  workflow_dispatch:
    inputs:
      server_to_rebuild:
        description: Which server should be rebuilt as the standby
        required: true
        type: choice
        options:
          - server_1
          - server_2
      confirm_rebuild_standby:
        description: Confirm the selected server will be wiped and rebuilt as a standby
        required: true
        type: boolean
      force_primary_rebuild:
        description: Force rebuild even if the target server thinks it is a primary (useful for split-brain recovery)
        required: true
        type: boolean
        default: false

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  rebuild-standby:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      APP_DIR: /home/deploy/yral-onboarding-hello-world-counter-prakash
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      CADDY_HTTP_PORT: 80
      CADDY_HTTPS_PORT: 443
      COUNTER_STORE: postgres
      GREETING_MODE: counter
      IMAGE_REF: ghcr.io/${{ github.repository }}:main
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      RUST_LOG: info
      SITE_ADDRESS: hello-world.prakash.yral.com
      STANDBY_NAME: standby1
      SERVER_1: ${{ secrets.SERVER_1_IP }}
      SERVER_2: ${{ secrets.SERVER_2_IP }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      CADDY_TLS_CERT_PEM_B64: ${{ secrets.CADDY_TLS_CERT_PEM_B64 }}
      CADDY_TLS_KEY_PEM_B64: ${{ secrets.CADDY_TLS_KEY_PEM_B64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Context
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_1_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H ${{ secrets.SERVER_2_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Resolve rebuild request
        id: topology
        run: |
          if [[ "${{ inputs.confirm_rebuild_standby }}" != "true" ]]; then
            echo "operator confirmation missing; expected confirm_rebuild_standby=true"
            exit 1
          fi

          if [[ "${{ inputs.server_to_rebuild }}" == "server_1" ]]; then
            echo "rebuild_ip=${SERVER_1}" >> "$GITHUB_OUTPUT"
            echo "primary_candidate_ip=${SERVER_2}" >> "$GITHUB_OUTPUT"
            echo "rebuild_label=server_1" >> "$GITHUB_OUTPUT"
            echo "primary_label=server_2" >> "$GITHUB_OUTPUT"
          else
            echo "rebuild_ip=${SERVER_2}" >> "$GITHUB_OUTPUT"
            echo "primary_candidate_ip=${SERVER_1}" >> "$GITHUB_OUTPUT"
            echo "rebuild_label=server_2" >> "$GITHUB_OUTPUT"
            echo "primary_label=server_1" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify rebuild topology
        id: verify
        run: |
          role_on_server() {
            local ip="$1"
            local result

            result="$(
              ssh -o BatchMode=yes -o ConnectTimeout=5 "deploy@${ip}" \
                "cd '${APP_DIR}' && docker compose exec -T postgres psql -U '${POSTGRES_USER}' -d '${POSTGRES_DB}' -tAc \"SELECT CASE WHEN pg_is_in_recovery() THEN 'standby' ELSE 'primary' END;\"" \
                2>/dev/null || echo "dead"
            )"

            result="$(echo "${result}" | tr -d '[:space:]')"

            case "${result}" in
              primary|standby|dead)
                echo "${result}"
                ;;
              *)
                echo "unknown"
                ;;
            esac
          }

          if ! ssh -o BatchMode=yes -o ConnectTimeout=5 "deploy@${{ steps.topology.outputs.rebuild_ip }}" "exit 0" >/dev/null 2>&1; then
            echo "selected rebuild target is not reachable over SSH"
            exit 1
          fi

          rebuild_role="$(role_on_server "${{ steps.topology.outputs.rebuild_ip }}")"
          primary_candidate_role="$(role_on_server "${{ steps.topology.outputs.primary_candidate_ip }}")"

          echo "rebuild_role=${rebuild_role}" >> "$GITHUB_OUTPUT"
          echo "primary_candidate_role=${primary_candidate_role}" >> "$GITHUB_OUTPUT"

          if [[ "${primary_candidate_role}" != "primary" ]]; then
            echo "the other node must currently be primary to rebuild a standby; got '${primary_candidate_role}'"
            exit 1
          fi

          if [[ "${rebuild_role}" == "primary" ]]; then
            if [[ "${{ inputs.force_primary_rebuild }}" != "true" ]]; then
              echo "refusing to rebuild the current primary as a standby without force_primary_rebuild=true"
              exit 1
            else
              echo "force_primary_rebuild is true, allowing rebuild of a primary node"
            fi
          fi

      - name: Copy deploy files to rebuild target
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.topology.outputs.rebuild_ip }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,caddy/Caddyfile.template,postgres/*.template,postgres/replica-entrypoint.sh,haproxy/postgres-primary.cfg.template,scripts/deploy/deploy-compose.sh,scripts/deploy/render-caddyfile.sh,scripts/deploy/render-postgres-runtime.sh,scripts/server/promote-postgres-standby.sh"
          target: ${{ env.APP_DIR }}

      - name: Rebuild standby node
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ steps.topology.outputs.rebuild_ip }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: APP_DIR,IMAGE_REF,SITE_ADDRESS,APP_HOST,APP_PORT,GREETING_MODE,COUNTER_STORE,RUST_LOG,CADDY_HTTP_PORT,CADDY_HTTPS_PORT,CADDY_TLS_CERT_PEM_B64,CADDY_TLS_KEY_PEM_B64,POSTGRES_PORT,POSTGRES_USER,POSTGRES_DB,POSTGRES_PASSWORD,STANDBY_NAME,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            mkdir -p "${APP_DIR}"
            cd "${APP_DIR}"

            project_name="$(basename "${APP_DIR}")"
            docker compose down || true
            docker volume rm "${project_name}_postgres_data" || true

            export DATABASE_PRIMARY_HOST="${{ steps.topology.outputs.primary_candidate_ip }}"
            export DATABASE_REPLICA_HOST="${{ steps.topology.outputs.rebuild_ip }}"
            export DB_ROLE="standby"
            export SERVER_LABEL="${{ steps.topology.outputs.rebuild_label }}"

            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            bash scripts/deploy/deploy-compose.sh

      - name: Wait for rebuilt standby readiness
        run: |
          role_on_server() {
            local ip="$1"
            local result

            result="$(
              ssh -o BatchMode=yes -o ConnectTimeout=5 "deploy@${ip}" \
                "cd '${APP_DIR}' && docker compose exec -T postgres psql -U '${POSTGRES_USER}' -d '${POSTGRES_DB}' -tAc \"SELECT CASE WHEN pg_is_in_recovery() THEN 'standby' ELSE 'primary' END;\"" \
                2>/dev/null || true
            )"

            echo "${result}" | tr -d '[:space:]'
          }

          for attempt in {1..30}; do
            rebuilt_role="$(role_on_server "${{ steps.topology.outputs.rebuild_ip }}")"
            if [[ "${rebuilt_role}" == "standby" ]]; then
              exit 0
            fi

            echo "waiting for rebuilt standby readiness; current role='${rebuilt_role:-unavailable}' (attempt ${attempt}/30)"
            sleep 2
          done

          echo "rebuilt standby did not become ready in time"
          exit 1

      - name: Verify rebuilt standby
        run: |
          role_on_server() {
            local ip="$1"
            local result

            result="$(
              ssh -o BatchMode=yes -o ConnectTimeout=5 "deploy@${ip}" \
                "cd '${APP_DIR}' && docker compose exec -T postgres psql -U '${POSTGRES_USER}' -d '${POSTGRES_DB}' -tAc \"SELECT CASE WHEN pg_is_in_recovery() THEN 'standby' ELSE 'primary' END;\"" \
                2>/dev/null || true
            )"

            echo "${result}" | tr -d '[:space:]'
          }

          rebuilt_role="$(role_on_server "${{ steps.topology.outputs.rebuild_ip }}")"
          primary_role="$(role_on_server "${{ steps.topology.outputs.primary_candidate_ip }}")"

          if [[ "${rebuilt_role}" != "standby" ]]; then
            echo "rebuilt node did not come back as standby; got '${rebuilt_role}'"
            exit 1
          fi

          if [[ "${primary_role}" != "primary" ]]; then
            echo "primary node changed unexpectedly during standby rebuild; got '${primary_role}'"
            exit 1
          fi

      - name: Rebuild summary
        run: |
          echo "Standby rebuild complete."
          echo "Rebuilt node: ${{ steps.topology.outputs.rebuild_ip }}"
          echo "Current primary: ${{ steps.topology.outputs.primary_candidate_ip }}"

name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  APP_DIR: /home/deploy/yral-onboarding-hello-world-counter-prakash
  IMAGE_REF: ghcr.io/${{ github.repository }}:${{ github.sha }}
  SITE_ADDRESS: hello-world.prakash.yral.com
  APP_HOST: 0.0.0.0
  APP_PORT: 3000
  GREETING_MODE: plain
  RUST_LOG: info
  CADDY_HTTP_PORT: 80
  CADDY_HTTPS_PORT: 443

jobs:
  verify:
    uses: ./.github/workflows/verify-reusable.yml

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SERVER_1_IP: ${{ secrets.SERVER_1_IP }}
      SERVER_2_IP: ${{ secrets.SERVER_2_IP }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:main

      - name: Copy deploy files to server 1
        if: ${{ env.SERVER_1_IP != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_1_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,caddy/Caddyfile,scripts/deploy/deploy-compose.sh"
          target: ${{ env.APP_DIR }}

      - name: Deploy to server 1
        if: ${{ env.SERVER_1_IP != '' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ env.SERVER_1_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: APP_DIR,IMAGE_REF,SITE_ADDRESS,APP_HOST,APP_PORT,GREETING_MODE,RUST_LOG,CADDY_HTTP_PORT,CADDY_HTTPS_PORT,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            mkdir -p "${APP_DIR}"
            cd "${APP_DIR}"
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            bash scripts/deploy/deploy-compose.sh

      - name: Copy deploy files to server 2
        if: ${{ env.SERVER_2_IP != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_2_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,caddy/Caddyfile,scripts/deploy/deploy-compose.sh"
          target: ${{ env.APP_DIR }}

      - name: Deploy to server 2
        if: ${{ env.SERVER_2_IP != '' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ env.SERVER_2_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: APP_DIR,IMAGE_REF,SITE_ADDRESS,APP_HOST,APP_PORT,GREETING_MODE,RUST_LOG,CADDY_HTTP_PORT,CADDY_HTTPS_PORT,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            mkdir -p "${APP_DIR}"
            cd "${APP_DIR}"
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            bash scripts/deploy/deploy-compose.sh

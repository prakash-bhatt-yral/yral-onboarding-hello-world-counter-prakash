name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  APP_DIR: /home/deploy/yral-onboarding-hello-world-counter-prakash
  IMAGE_REF: ghcr.io/${{ github.repository }}:${{ github.sha }}
  SITE_ADDRESS: hello-world.prakash.yral.com
  APP_HOST: 0.0.0.0
  APP_PORT: 3000
  GREETING_MODE: counter
  COUNTER_STORE: postgres
  RUST_LOG: info
  CADDY_HTTP_PORT: 80
  CADDY_HTTPS_PORT: 443
  POSTGRES_PORT: 5432
  POSTGRES_USER: postgres
  POSTGRES_DB: postgres
  STANDBY_NAME: standby1

jobs:
  verify:
    uses: ./.github/workflows/verify-reusable.yml

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SERVER_1_IP: ${{ secrets.SERVER_1_IP }}
      SERVER_2_IP: ${{ secrets.SERVER_2_IP }}
      CADDY_TLS_CERT_PEM_B64: ${{ secrets.CADDY_TLS_CERT_PEM_B64 }}
      CADDY_TLS_KEY_PEM_B64: ${{ secrets.CADDY_TLS_KEY_PEM_B64 }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:main

      - name: Prepare SSH for topology probe
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${SERVER_1_IP}" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H "${SERVER_2_IP}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Discover cluster topology
        id: topology
        run: |
          role_on_server() {
            local ip="$1"
            local result

            result="$(
              ssh -o BatchMode=yes -o ConnectTimeout=5 "deploy@${ip}" \
                "cd '${APP_DIR}' && docker compose exec -T postgres psql -U '${POSTGRES_USER}' -d '${POSTGRES_DB}' -tAc \"SELECT CASE WHEN pg_is_in_recovery() THEN 'standby' ELSE 'primary' END;\"" \
                2>/dev/null || echo "dead"
            )"

            result="$(echo "${result}" | tr -d '[:space:]')"

            case "${result}" in
              primary|standby|dead)
                echo "${result}"
                ;;
              *)
                echo "unknown"
                ;;
            esac
          }

          server_1_state="$(role_on_server "${SERVER_1_IP}")"
          server_2_state="$(role_on_server "${SERVER_2_IP}")"

          echo "server_1_state=${server_1_state}" >> "$GITHUB_OUTPUT"
          echo "server_2_state=${server_2_state}" >> "$GITHUB_OUTPUT"

          case "${server_1_state}:${server_2_state}" in
            primary:standby)
              primary_host="${SERVER_1_IP}"
              replica_host="${SERVER_2_IP}"
              ;;
            standby:primary)
              primary_host="${SERVER_2_IP}"
              replica_host="${SERVER_1_IP}"
              ;;
            primary:dead)
              primary_host="${SERVER_1_IP}"
              replica_host="${SERVER_2_IP}"
              ;;
            dead:primary)
              primary_host="${SERVER_2_IP}"
              replica_host="${SERVER_1_IP}"
              ;;
            dead:standby|standby:dead)
              echo "Cluster requires manual failover before deploy: surviving node is still a standby."
              exit 1
              ;;
            dead:dead)
              echo "Bootstrapping fresh cluster."
              primary_host="${SERVER_1_IP}"
              replica_host="${SERVER_2_IP}"
              echo "server_1_state=primary" >> "$GITHUB_OUTPUT"
              echo "server_2_state=standby" >> "$GITHUB_OUTPUT"
              ;;
            primary:primary)
              echo "Unsafe cluster state: both nodes report primary."
              exit 1
              ;;
            standby:standby)
              echo "Unsafe cluster state: both nodes report standby."
              exit 1
              ;;
            *)
              echo "Unable to determine safe topology: ${server_1_state}:${server_2_state}"
              exit 1
              ;;
          esac

          echo "primary_host=${primary_host}" >> "$GITHUB_OUTPUT"
          echo "replica_host=${replica_host}" >> "$GITHUB_OUTPUT"

      - name: Copy deploy files to server 1
        if: ${{ env.SERVER_1_IP != '' && steps.topology.outputs.server_1_state != 'dead' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_1_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,caddy/Caddyfile.template,postgres/*.template,postgres/replica-entrypoint.sh,haproxy/postgres-primary.cfg.template,scripts/deploy/deploy-compose.sh,scripts/deploy/render-caddyfile.sh,scripts/deploy/render-postgres-runtime.sh,scripts/server/promote-postgres-standby.sh"
          target: ${{ env.APP_DIR }}

      - name: Deploy to server 1
        if: ${{ env.SERVER_1_IP != '' && steps.topology.outputs.server_1_state != 'dead' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          COUNTER_STORE: ${{ env.COUNTER_STORE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_PORT: ${{ env.POSTGRES_PORT }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          STANDBY_NAME: ${{ env.STANDBY_NAME }}
        with:
          host: ${{ env.SERVER_1_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: APP_DIR,IMAGE_REF,SITE_ADDRESS,APP_HOST,APP_PORT,GREETING_MODE,COUNTER_STORE,RUST_LOG,CADDY_HTTP_PORT,CADDY_HTTPS_PORT,CADDY_TLS_CERT_PEM_B64,CADDY_TLS_KEY_PEM_B64,POSTGRES_PORT,POSTGRES_USER,POSTGRES_DB,POSTGRES_PASSWORD,STANDBY_NAME,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            mkdir -p "${APP_DIR}"
            cd "${APP_DIR}"

            export DATABASE_PRIMARY_HOST="${{ steps.topology.outputs.primary_host }}"
            export DATABASE_REPLICA_HOST="${{ steps.topology.outputs.replica_host }}"
            export SERVER_LABEL="server_1"
            if [[ "${{ env.SERVER_1_IP }}" == "${{ steps.topology.outputs.primary_host }}" ]]; then
              export DB_ROLE="primary"
            else
              export DB_ROLE="standby"
            fi

            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            bash scripts/deploy/deploy-compose.sh

      - name: Copy deploy files to server 2
        if: ${{ env.SERVER_2_IP != '' && steps.topology.outputs.server_2_state != 'dead' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_2_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,caddy/Caddyfile.template,postgres/*.template,postgres/replica-entrypoint.sh,haproxy/postgres-primary.cfg.template,scripts/deploy/deploy-compose.sh,scripts/deploy/render-caddyfile.sh,scripts/deploy/render-postgres-runtime.sh,scripts/server/promote-postgres-standby.sh"
          target: ${{ env.APP_DIR }}

      - name: Deploy to server 2
        if: ${{ env.SERVER_2_IP != '' && steps.topology.outputs.server_2_state != 'dead' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          COUNTER_STORE: ${{ env.COUNTER_STORE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_PORT: ${{ env.POSTGRES_PORT }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          STANDBY_NAME: ${{ env.STANDBY_NAME }}
        with:
          host: ${{ env.SERVER_2_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: APP_DIR,IMAGE_REF,SITE_ADDRESS,APP_HOST,APP_PORT,GREETING_MODE,COUNTER_STORE,RUST_LOG,CADDY_HTTP_PORT,CADDY_HTTPS_PORT,CADDY_TLS_CERT_PEM_B64,CADDY_TLS_KEY_PEM_B64,POSTGRES_PORT,POSTGRES_USER,POSTGRES_DB,POSTGRES_PASSWORD,STANDBY_NAME,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            mkdir -p "${APP_DIR}"
            cd "${APP_DIR}"

            export DATABASE_PRIMARY_HOST="${{ steps.topology.outputs.primary_host }}"
            export DATABASE_REPLICA_HOST="${{ steps.topology.outputs.replica_host }}"
            export SERVER_LABEL="server_2"
            if [[ "${{ env.SERVER_2_IP }}" == "${{ steps.topology.outputs.primary_host }}" ]]; then
              export DB_ROLE="primary"
            else
              export DB_ROLE="standby"
            fi

            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            bash scripts/deploy/deploy-compose.sh

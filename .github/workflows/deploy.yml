name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  APP_DIR: /home/deploy/yral-onboarding-hello-world-counter-prakash
  IMAGE_REF: ghcr.io/${{ github.repository }}:${{ github.sha }}
  SITE_ADDRESS: hello-world.prakash.yral.com
  APP_HOST: 0.0.0.0
  APP_PORT: 3000
  GREETING_MODE: counter
  COUNTER_STORE: postgres
  RUST_LOG: info
  CADDY_HTTP_PORT: 80
  CADDY_HTTPS_PORT: 443
  POSTGRES_PORT: 5432
  POSTGRES_USER: postgres
  POSTGRES_DB: postgres

jobs:
  verify:
    uses: ./.github/workflows/verify-reusable.yml

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SERVER_1_IP: ${{ secrets.SERVER_1_IP }}
      SERVER_2_IP: ${{ secrets.SERVER_2_IP }}
      SERVER_3_IP: ${{ secrets.SERVER_3_IP }}
      CADDY_TLS_CERT_PEM_B64: ${{ secrets.CADDY_TLS_CERT_PEM_B64 }}
      CADDY_TLS_KEY_PEM_B64: ${{ secrets.CADDY_TLS_KEY_PEM_B64 }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:main

      - name: Deploy HA Cluster
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          declare -A SERVERS
          SERVERS=(
            ["server_1"]="${SERVER_1_IP}"
            ["server_2"]="${SERVER_2_IP}"
            ["server_3"]="${SERVER_3_IP}"
          )
          
          for NODE_NAME in "${!SERVERS[@]}"; do
            NODE_IP="${SERVERS[$NODE_NAME]}"
            if [[ -z "${NODE_IP}" ]]; then 
              echo "Skipping ${NODE_NAME} (No IP provided)"
              continue
            fi
            
            echo "--> Bootstrapping ${NODE_NAME} at ${NODE_IP}"
            ssh-keyscan -H "${NODE_IP}" >> ~/.ssh/known_hosts 2>/dev/null || true
            
            ssh "deploy@${NODE_IP}" "mkdir -p ${APP_DIR} ${APP_DIR}/runtime/postgres"
            scp -r docker-compose.ha.yml caddy postgres haproxy scripts "deploy@${NODE_IP}:${APP_DIR}/"
            
            ssh "deploy@${NODE_IP}" \
              "export APP_DIR='${APP_DIR}'; \
               export IMAGE_REF='${IMAGE_REF}'; \
               export SITE_ADDRESS='${SITE_ADDRESS}'; \
               export APP_HOST='${APP_HOST}'; \
               export APP_PORT='${APP_PORT}'; \
               export SERVER_1_IP='${SERVER_1_IP}'; \
               export SERVER_2_IP='${SERVER_2_IP}'; \
               export SERVER_3_IP='${SERVER_3_IP}'; \
               export NODE_NAME='${NODE_NAME}'; \
               export NODE_IP='${NODE_IP}'; \
               export POSTGRES_PASSWORD='${POSTGRES_PASSWORD}'; \
               export POSTGRES_USER='${POSTGRES_USER}'; \
               cd ${APP_DIR} && \
               echo '${GITHUB_TOKEN}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin && \
               bash scripts/deploy/deploy-ha-compose.sh"
          done

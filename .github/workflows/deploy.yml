name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Copy deploy files to server 1
        if: ${{ secrets.SERVER_1_IP != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_1_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,caddy/Caddyfile,scripts/deploy/deploy-compose.sh"
          target: /home/deploy/yral-onboarding-hello-world-counter-prakash

      - name: Deploy to server 1
        if: ${{ secrets.SERVER_1_IP != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_1_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: IMAGE_REF,APP_HOST,APP_PORT,GREETING_MODE,RUST_LOG,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            mkdir -p /home/deploy/yral-onboarding-hello-world-counter-prakash
            cd /home/deploy/yral-onboarding-hello-world-counter-prakash
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            bash scripts/deploy/deploy-compose.sh
        env:
          IMAGE_REF: ghcr.io/${{ github.repository }}:${{ github.sha }}
          APP_HOST: 0.0.0.0
          APP_PORT: 3000
          GREETING_MODE: plain
          RUST_LOG: info
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Copy deploy files to server 2
        if: ${{ secrets.SERVER_2_IP != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_2_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,caddy/Caddyfile,scripts/deploy/deploy-compose.sh"
          target: /home/deploy/yral-onboarding-hello-world-counter-prakash

      - name: Deploy to server 2
        if: ${{ secrets.SERVER_2_IP != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_2_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: IMAGE_REF,APP_HOST,APP_PORT,GREETING_MODE,RUST_LOG,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            mkdir -p /home/deploy/yral-onboarding-hello-world-counter-prakash
            cd /home/deploy/yral-onboarding-hello-world-counter-prakash
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            bash scripts/deploy/deploy-compose.sh
        env:
          IMAGE_REF: ghcr.io/${{ github.repository }}:${{ github.sha }}
          APP_HOST: 0.0.0.0
          APP_PORT: 3000
          GREETING_MODE: plain
          RUST_LOG: info
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

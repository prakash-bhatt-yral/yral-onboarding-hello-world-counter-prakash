name: Manual Failover

on:
  workflow_dispatch:
    inputs:
      down_server:
        description: Which server is confirmed powered off or isolated
        required: true
        type: choice
        options:
          - server_1
          - server_2
      confirm_server_is_down:
        description: Confirm the selected server is powered off or isolated
        required: true
        type: boolean

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  runbook-failover:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      APP_DIR: /home/deploy/yral-onboarding-hello-world-counter-prakash
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      CADDY_HTTP_PORT: 80
      CADDY_HTTPS_PORT: 443
      COUNTER_STORE: postgres
      GREETING_MODE: counter
      IMAGE_REF: ghcr.io/${{ github.repository }}:main
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      RUST_LOG: info
      SITE_ADDRESS: hello-world.prakash.yral.com
      STANDBY_NAME: standby1
      SERVER_1: ${{ secrets.SERVER_1_IP }}
      SERVER_2: ${{ secrets.SERVER_2_IP }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      CADDY_TLS_CERT_PEM_B64: ${{ secrets.CADDY_TLS_CERT_PEM_B64 }}
      CADDY_TLS_KEY_PEM_B64: ${{ secrets.CADDY_TLS_KEY_PEM_B64 }}
    steps:
      - name: Setup SSH Context
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_1_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H ${{ secrets.SERVER_2_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Resolve requested failover
        id: topology
        run: |
          if [[ "${{ inputs.confirm_server_is_down }}" != "true" ]]; then
            echo "operator confirmation missing; expected confirm_server_is_down=true"
            exit 1
          fi

          if [[ "${{ inputs.down_server }}" == "server_1" ]]; then
            echo "failed_ip=${SERVER_1}" >> "$GITHUB_OUTPUT"
            echo "target_ip=${SERVER_2}" >> "$GITHUB_OUTPUT"
            echo "target_label=server_2" >> "$GITHUB_OUTPUT"
          else
            echo "failed_ip=${SERVER_2}" >> "$GITHUB_OUTPUT"
            echo "target_ip=${SERVER_1}" >> "$GITHUB_OUTPUT"
            echo "target_label=server_1" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify fenced and promotable state
        id: verify
        run: |
          role_on_server() {
            local ip="$1"
            ssh -o BatchMode=yes -o ConnectTimeout=5 "deploy@${ip}" \
              "cd '${APP_DIR}' && docker compose exec -T postgres psql -U '${POSTGRES_USER}' -d '${POSTGRES_DB}' -tAc \"SELECT CASE WHEN pg_is_in_recovery() THEN 'standby' ELSE 'primary' END;\"" \
              2>/dev/null | tr -d '[:space:]'
          }

          if ssh -o BatchMode=yes -o ConnectTimeout=5 "deploy@${{ steps.topology.outputs.failed_ip }}" "exit 0" >/dev/null 2>&1; then
            echo "selected fenced server is still reachable; aborting"
            exit 1
          fi

          target_role="$(role_on_server "${{ steps.topology.outputs.target_ip }}")"
          echo "target_role=${target_role}" >> "$GITHUB_OUTPUT"

          if [[ "${target_role}" != "standby" ]]; then
            echo "target server must be a standby before promotion; got '${target_role}'"
            exit 1
          fi

          echo "======================================"
          echo "    INITIATING RUNBOOK FAILOVER"
          echo "======================================"
          echo "Confirmed down server: [ ${{ steps.topology.outputs.failed_ip }} ]"
          echo "Promotion target: [ ${{ steps.topology.outputs.target_ip }} ]"
          echo "Promotion target role: [ ${target_role} ]"

      - name: Promote standby
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=10 "deploy@${{ steps.topology.outputs.target_ip }}" \
            "cd '${APP_DIR}' && POSTGRES_USER='${POSTGRES_USER}' bash scripts/server/promote-postgres-standby.sh"

      - name: Repoint surviving node router
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ steps.topology.outputs.target_ip }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: APP_DIR,IMAGE_REF,SITE_ADDRESS,APP_HOST,APP_PORT,GREETING_MODE,COUNTER_STORE,RUST_LOG,CADDY_HTTP_PORT,CADDY_HTTPS_PORT,CADDY_TLS_CERT_PEM_B64,CADDY_TLS_KEY_PEM_B64,POSTGRES_PORT,POSTGRES_USER,POSTGRES_DB,POSTGRES_PASSWORD,STANDBY_NAME,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            mkdir -p "${APP_DIR}"
            cd "${APP_DIR}"
            export DATABASE_PRIMARY_HOST="${{ steps.topology.outputs.target_ip }}"
            export DATABASE_REPLICA_HOST="${{ steps.topology.outputs.failed_ip }}"
            export DB_ROLE="primary"
            export SERVER_LABEL="${{ steps.topology.outputs.target_label }}"

            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            bash scripts/deploy/deploy-compose.sh

      - name: Restart dependent services on surviving node
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=10 "deploy@${{ steps.topology.outputs.target_ip }}" \
            "cd '${APP_DIR}' && docker compose restart postgres-router app"

      - name: Failover summary
        run: |
          echo "Failover complete."
          echo "The surviving node has been re-rendered against the new primary."
          echo "Future deploys will rediscover topology from both nodes."
          echo "Do not bring the down node back online until it has been rebuilt as a standby."

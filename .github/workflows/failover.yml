name: Manual Failover

on:
  workflow_dispatch:
    inputs:
      confirm_emergency_failover:
        description: Confirm you are executing an emergency failover to rescue the cluster
        required: true
        type: boolean

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  runbook-failover:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      APP_DIR: /home/deploy/yral-onboarding-hello-world-counter-prakash
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      CADDY_HTTP_PORT: 80
      CADDY_HTTPS_PORT: 443
      COUNTER_STORE: postgres
      GREETING_MODE: counter
      IMAGE_REF: ghcr.io/${{ github.repository }}:main
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      RUST_LOG: info
      SITE_ADDRESS: hello-world.prakash.yral.com
      STANDBY_NAME: standby1
      SERVER_1: ${{ secrets.SERVER_1_IP }}
      SERVER_2: ${{ secrets.SERVER_2_IP }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      CADDY_TLS_CERT_PEM_B64: ${{ secrets.CADDY_TLS_CERT_PEM_B64 }}
      CADDY_TLS_KEY_PEM_B64: ${{ secrets.CADDY_TLS_KEY_PEM_B64 }}
    steps:
      - name: Setup SSH Context
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_1_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H ${{ secrets.SERVER_2_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Auto-discover outage and verify promotable state
        id: topology
        run: |
          if [[ "${{ inputs.confirm_emergency_failover }}" != "true" ]]; then
            echo "operator confirmation missing; expected confirm_emergency_failover=true"
            exit 1
          fi

          role_on_server() {
            local ip="$1"
            local result
            result="$(
              ssh -o BatchMode=yes -o ConnectTimeout=5 "deploy@${ip}" \
                "cd '${APP_DIR}' && docker compose exec -T postgres psql -U '${POSTGRES_USER}' -d '${POSTGRES_DB}' -tAc \"SELECT CASE WHEN pg_is_in_recovery() THEN 'standby' ELSE 'primary' END;\"" \
                2>/dev/null || echo "dead"
            )"
            echo "${result}" | tr -d '[:space:]'
          }

          echo "Pinging Server 1 (${SERVER_1})..."
          server_1_role="$(role_on_server "${SERVER_1}")"
          echo "Server 1 is: ${server_1_role}"

          echo "Pinging Server 2 (${SERVER_2})..."
          server_2_role="$(role_on_server "${SERVER_2}")"
          echo "Server 2 is: ${server_2_role}"

          if [[ "${server_1_role}" == "dead" && "${server_2_role}" == "standby" ]]; then
            echo "Failed Server IS Server 1. Target is Server 2."
            failed_ip="${SERVER_1}"
            target_ip="${SERVER_2}"
            target_label="server_2"
            target_role="standby"
          elif [[ "${server_2_role}" == "dead" && "${server_1_role}" == "standby" ]]; then
            echo "Failed Server IS Server 2. Target is Server 1."
            failed_ip="${SERVER_2}"
            target_ip="${SERVER_1}"
            target_label="server_1"
            target_role="standby"
          elif [[ "${server_1_role}" == "dead" && "${server_2_role}" == "primary" ]]; then
            echo "Error: Server 1 is dead, but Server 2 is ALREADY the primary. No failover needed. The cluster is surviving."
            echo "Abort: Run Rebuild Standby on Server 1 when it comes back online."
            exit 1
          elif [[ "${server_2_role}" == "dead" && "${server_1_role}" == "primary" ]]; then
            echo "Error: Server 2 is dead, but Server 1 is ALREADY the primary. No failover needed. The cluster is surviving."
            echo "Abort: Run Rebuild Standby on Server 2 when it comes back online."
            exit 1
          elif [[ "${server_1_role}" != "dead" && "${server_2_role}" != "dead" ]]; then
            echo "Error: BOTH servers are active. An Emergency Failover requires one dead node."
            echo "Abort: Use switchover-drill for planned maintenance, or physically stop a node first for scream-testing."
            exit 1
          elif [[ "${server_1_role}" == "dead" && "${server_2_role}" == "dead" ]]; then
            echo "Error: BOTH servers are dead. Complete datacenter outage."
            exit 1
          else
            echo "Error: Invalid state detected. S1: ${server_1_role}, S2: ${server_2_role}"
            exit 1
          fi

          echo "failed_ip=${failed_ip}" >> "$GITHUB_OUTPUT"
          echo "target_ip=${target_ip}" >> "$GITHUB_OUTPUT"
          echo "target_label=${target_label}" >> "$GITHUB_OUTPUT"
          
          echo "======================================"
          echo "    INITIATING SMART ZERO-CLICK FAILOVER"
          echo "======================================"
          echo "Confirmed down server: [ ${failed_ip} ]"
          echo "Promotion target: [ ${target_ip} ]"
          echo "Promotion target role: [ ${target_role} ]"

      - name: Promote standby
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=10 "deploy@${{ steps.topology.outputs.target_ip }}" \
            "cd '${APP_DIR}' && POSTGRES_USER='${POSTGRES_USER}' bash scripts/server/promote-postgres-standby.sh"

      - name: Repoint surviving node router
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ steps.topology.outputs.target_ip }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: APP_DIR,IMAGE_REF,SITE_ADDRESS,APP_HOST,APP_PORT,GREETING_MODE,COUNTER_STORE,RUST_LOG,CADDY_HTTP_PORT,CADDY_HTTPS_PORT,CADDY_TLS_CERT_PEM_B64,CADDY_TLS_KEY_PEM_B64,POSTGRES_PORT,POSTGRES_USER,POSTGRES_DB,POSTGRES_PASSWORD,STANDBY_NAME,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            mkdir -p "${APP_DIR}"
            cd "${APP_DIR}"
            export DATABASE_PRIMARY_HOST="${{ steps.topology.outputs.target_ip }}"
            export DATABASE_REPLICA_HOST="${{ steps.topology.outputs.failed_ip }}"
            export DB_ROLE="primary"
            export SERVER_LABEL="${{ steps.topology.outputs.target_label }}"

            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            bash scripts/deploy/deploy-compose.sh

      - name: Restart dependent services on surviving node
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=10 "deploy@${{ steps.topology.outputs.target_ip }}" \
            "cd '${APP_DIR}' && docker compose restart postgres-router app"

      - name: Failover summary
        run: |
          echo "Failover complete."
          echo "The surviving node has been re-rendered against the new primary."
          echo "Future deploys will rediscover topology from both nodes."
          echo "Do not bring the down node back online until it has been rebuilt as a standby."
